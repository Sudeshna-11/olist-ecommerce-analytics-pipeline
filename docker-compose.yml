services:
  postgres:
    image: postgres:16-alpine
    container_name: olist_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-olist_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-olist_pass}
      POSTGRES_DB: ${POSTGRES_DB:-olist}
    ports:
      - "5432:5432"
    volumes:
      - olist_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-olist_user} -d ${POSTGRES_DB:-olist}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  olist_pgdata:
