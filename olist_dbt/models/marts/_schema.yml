version: 2

# Gold layer — Kimball star schema. Grain is declared explicitly on every
# fact/dim (Kimball discipline: a model you can't state the grain of is a
# model you can't test). FK integrity is enforced with relationships tests,
# which is what turns a pile of tables into a navigable star.

models:

  - name: fct_order_items
    description: >
      Line-grain revenue fact: one row per (order_id, order_item_seq).
      Incremental on purchased_at. Conformed dims joined by surrogate key;
      dim_products joined point-in-time. BRL native + USD/EUR via FX.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - order_id
            - order_item_seq
    columns:
      - name: order_item_key
        description: "Surrogate PK = md5(order_id + order_item_seq)."
        tests:
          - not_null
          - unique
      - name: product_key
        description: "FK to dim_products (point-in-time version)."
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: product_key
      - name: seller_key
        description: "FK to dim_sellers."
        tests:
          - not_null
          - relationships:
              to: ref('dim_sellers')
              field: seller_key
      - name: customer_key
        description: "FK to dim_customers."
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_key
      - name: purchase_date_key
        description: "FK to dim_dates."
        tests:
          - not_null
          - relationships:
              to: ref('dim_dates')
              field: date_key
      - name: item_price_brl
        description: "Line item price, native BRL."
        tests:
          - not_null

  - name: fct_order_reviews
    description: >
      Review-grain fact: one row per (review_id, order_id). review_id and
      order_id are each individually non-unique (a review can span orders;
      an order can have several reviews) — the pair is the grain, captured
      by review_key.
    columns:
      - name: review_key
        description: "Surrogate PK = md5(review_id + order_id)."
        tests:
          - not_null
          - unique
      - name: review_id
        description: "Review business key. Intentionally NOT unique (a review may cover multiple orders)."
        tests:
          - not_null
      - name: order_id
        description: "FK to fct_orders. Not unique (an order may have multiple reviews)."
        tests:
          - not_null
          - relationships:
              to: ref('fct_orders')
              field: order_id
      - name: customer_key
        description: "FK to dim_customers, reached via the order."
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_key
      - name: review_date_key
        description: "FK to dim_dates (review creation date)."
        tests:
          - relationships:
              to: ref('dim_dates')
              field: date_key
      - name: purchase_date_key
        description: "FK to dim_dates (order purchase date)."
        tests:
          - relationships:
              to: ref('dim_dates')
              field: date_key
      - name: review_score
        description: "1-5 star rating (the measure)."
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4, 5]
              quote: false

  - name: dim_dates
    description: >
      Date dimension, one row per calendar day (2016-01-01 .. 2018-12-31),
      generated with dbt_utils.date_spine(). Conformed: every fact joins to
      it on date_key.
    columns:
      - name: date_key
        description: "Surrogate key, integer YYYYMMDD. Facts join on this."
        tests:
          - not_null
          - unique
      - name: date_day
        description: "Natural key, the calendar date itself."
        tests:
          - not_null
          - unique
      - name: day_of_week
        description: "0=Sunday .. 6=Saturday (Postgres extract(dow))."
        tests:
          - not_null
          - accepted_values:
              values: [0, 1, 2, 3, 4, 5, 6]
              quote: false

  - name: fct_orders
    description: >
      Header-grain fact: one row per order_id. Status, delivery cycle-times,
      and merchandise + payment rollups. Per-line revenue lives in
      fct_order_items.
    columns:
      - name: order_id
        description: "Degenerate dimension and grain of the fact."
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "FK to dim_customers."
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id
      - name: purchase_date_key
        description: "FK to dim_dates. Always populated — every order has a purchase timestamp."
        tests:
          - not_null
          - relationships:
              to: ref('dim_dates')
              field: date_key
      - name: order_status
        description: "Order lifecycle state (carried from staging)."
        tests:
          - not_null
          - accepted_values:
              values:
                - delivered
                - shipped
                - canceled
                - unavailable
                - invoiced
                - processing
                - approved
                - created
      - name: total_payment_brl
        description: "Sum of all payment records on the order, BRL. 0 if no payment row."
        tests:
          - not_null

  - name: dim_customers
    description: >
      Customer dimension, one row per customer_id (Type 1). ZIP-level
      lat/lng centroid joined in. customer_unique_id is the stable
      cross-order shopper identity.
    columns:
      - name: customer_key
        description: "Surrogate key (md5 of customer_id)."
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "Natural key / grain. FK target for fct_orders."
        tests:
          - not_null
          - unique
      - name: customer_state
        description: "Brazilian state code (2 letters)."
        tests:
          - not_null

  - name: dim_products
    description: >
      SCD Type 2 product dimension, one row per product version (sourced
      from products_snapshot). English category joined in. Tracks
      descriptive attributes (category, weight, dimensions) over time —
      Olist has no product price, so price is not modelled here.
    columns:
      - name: product_key
        description: "Surrogate key, unique per version (md5 of product_id + valid_from)."
        tests:
          - not_null
          - unique
      - name: product_id
        description: "Business key. Intentionally NOT unique — repeats across SCD2 versions."
        tests:
          - not_null
      - name: is_current
        description: "True for the currently-effective version (valid_to is null)."
        tests:
          - not_null

  - name: dim_sellers
    description: "Seller dimension, one row per seller_id (Type 1). ZIP-level lat/lng centroid joined in."
    columns:
      - name: seller_key
        description: "Surrogate key (md5 of seller_id)."
        tests:
          - not_null
          - unique
      - name: seller_id
        description: "Natural key / grain. FK target for fct_order_items (when built)."
        tests:
          - not_null
          - unique
      - name: seller_state
        description: "Brazilian state code (2 letters)."
        tests:
          - not_null
