version: 2

# Tests demonstrate the four standard dbt test categories:
#   * not_null        (data quality)
#   * unique          (key integrity)
#   * accepted_values (controlled vocabulary / enum)
#   * relationships   (foreign-key check across models)
# These run on `dbt test` and fail loudly if invariants break.

models:

  - name: stg_olist__customers
    description: "One row per customer_id. Use customer_unique_id to count repeat shoppers."
    columns:
      - name: customer_id
        description: "Per-order identity. Unique within this table."
        tests:
          - not_null
          - unique
      - name: customer_unique_id
        description: "Stable identity across orders (one shopper may have many customer_ids)."
        tests:
          - not_null
      - name: customer_state
        description: "Brazilian state code (2 letters, uppercased here)."
        tests:
          - not_null

  - name: stg_olist__orders
    description: "One row per order_id. Five timestamps + status + derived delivery flags."
    columns:
      - name: order_id
        description: "Order PK."
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "FK to stg_olist__customers."
        tests:
          - not_null
          - relationships:
              to: ref('stg_olist__customers')
              field: customer_id
      - name: order_status
        description: "Lifecycle state. Eight known values."
        tests:
          - not_null
          - accepted_values:
              values:
                - delivered
                - shipped
                - canceled
                - unavailable
                - invoiced
                - processing
                - approved
                - created
